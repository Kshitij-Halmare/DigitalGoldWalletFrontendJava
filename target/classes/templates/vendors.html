<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Vendors</title>
<!--    <link rel="stylesheet" th:href="@{/css/vendors.css}">-->
    <style>
        /* ==============================================
           VENDORS PAGE — INLINE STYLES
           ============================================== */

        :root {
          --gold:       #C9973F;
          --gold-dim:   #9a7830;
          --gold-pale:  #e8c97a;
          --bg:         #080705;
          --card-bg:    #0f0d09;
          --border:     #252018;
          --border-2:   #1a1712;
          --text:       #ede6d8;
          --muted:      #8a7e6a;
          --subtle:     #6a6050;
        }

        *, *::before, *::after {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        body {
          font-family: 'DM Sans', sans-serif;
          background: var(--bg);
          color: var(--text);
          padding: 40px;
        }

        /* ── HEADER ── */
        .header {
          display: flex;
          flex-direction: column;
          gap: 16px;
          margin-bottom: 30px;
        }

        .breadcrumbs {
          font-size: 0.85rem;
          color: var(--subtle);
          display: flex;
          align-items: center;
          gap: 6px;
        }

        .breadcrumbs a {
          color: var(--muted);
          text-decoration: none;
        }

        .breadcrumbs a:hover {
          color: var(--gold);
        }

        .breadcrumbs .active {
          color: var(--gold-pale);
        }

        h2 {
          font-family: 'Cormorant Garamond', serif;
          font-size: 2.5rem;
          font-weight: 300;
        }

        .header a button {
          align-self: flex-start;
        }

        /* ── BUTTON ── */
        button {
          background: #1e1a10;
          border: 1px solid var(--gold-dim);
          border-radius: 8px;
          padding: 10px 16px;
          font-family: 'DM Sans', sans-serif;
          font-size: 0.85rem;
          font-weight: 600;
          color: var(--gold);
          cursor: pointer;
          transition: all 0.2s ease;
          margin: 2px;
        }

        button:hover {
          background: rgba(201,151,63,0.15);
          border-color: var(--gold);
          color: var(--gold-pale);
        }

        /* ── TABLE ── */
        table {
          width: 100%;
          border-collapse: collapse;
          background: var(--card-bg);
          border: 1px solid var(--border);
          border-radius: 12px;
          overflow: hidden;
        }

        thead {
          background: #0c0a07;
        }

        th {
          padding: 14px;
          font-size: 12px;
          letter-spacing: 0.12em;
          text-transform: uppercase;
          color: var(--subtle);
          text-align: left;
          border-bottom: 1px solid var(--border);
        }

        td {
          padding: 14px;
          font-size: 0.9rem;
          color: var(--muted);
          border-bottom: 1px solid var(--border-2);
        }

        tr:hover {
          background: #141108;
        }

        tr:last-child td {
          border-bottom: none;
        }

        /* ── SPECIAL CELLS ── */
        td:first-child {
          font-weight: 600;
          color: var(--text);
        }

        td:nth-child(5),
        td:nth-child(6) {
          font-family: 'Cormorant Garamond', serif;
          color: var(--gold-pale);
          font-size: 1rem;
        }

        td a {
          color: var(--gold-dim);
          text-decoration: none;
        }

        td a:hover {
          color: var(--gold);
        }

        /* ── ACTION BUTTONS ── */
        td button {
          font-size: 0.75rem;
          padding: 6px 10px;
        }

        /* ── EMPTY STATE ── */
        td[colspan] {
          text-align: center;
          padding: 40px;
          color: var(--muted);
        }

        /* ── PAGINATION ── */
        #pagination {
          display: flex;
          justify-content: center;
          gap: 6px;
          margin-top: 30px;
          flex-wrap: wrap;
        }

        #pagination button {
          min-width: 36px;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 900px) {
          body {
            padding: 20px;
          }

          table {
            display: block;
            overflow-x: auto;
          }
        }

    </style>
</head>

<body>

<div class="header">
    <div class="breadcrumbs">
        <a th:href="@{/}">Home</a>
        <span>›</span>
        <span class="active">Vendors</span>
    </div>

    <h2>Vendor List</h2>

    <a th:href="@{/vendors/add}">
        <button>Add Vendor</button>
    </a>
</div>

<div>
    <table>
        <thead>
        <tr>
            <th>Name</th>
            <th>Contact Person</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Gold Qty</th>
            <th>Price</th>
            <th>Website</th>
            <th>Description</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="v : ${vendors}">
            <td th:text="${v.vendorName}"></td>
            <td th:text="${v.contactPersonName}"></td>
            <td th:text="${v.contactEmail}"></td>
            <td th:text="${v.contactPhone}"></td>
            <td th:text="${v.totalGoldQuantity}"></td>
            <td th:text="${v.currentGoldPrice}"></td>
            <td>
                <a th:href="${v.websiteUrl}" target="_blank">Visit</a>
            </td>
            <td th:text="${v.description}"></td>

            <td>
                <a th:href="@{/vendors/{id}/branches(id=${v.id})}">
                    <button>View Branches</button>
                </a>

                <a th:href="@{/vendors/edit/{id}(id=${v.id})}">
                    <button>Update</button>
                </a>
            </td>
        </tr>

        <tr th:if="${vendors.size() == 0}">
            <td colspan="9">No vendors found</td>
        </tr>
        </tbody>
    </table>
</div>

<!-- PAGINATION -->
<div id="pagination">
    <a th:if="${currentPage > 0}"
       th:href="@{/vendors(page=${currentPage - 1})}">
        <button>&larr;</button>
    </a>

    <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
        <a th:href="@{/vendors(page=${i})}">
            <button th:text="${i + 1}"
                    th:style="${i == currentPage} ? 'font-weight:bold' : ''">
            </button>
        </a>
    </span>

    <a th:if="${currentPage < totalPages - 1}"
       th:href="@{/vendors(page=${currentPage + 1})}">
        <button>&rarr;</button>
    </a>
</div>

</body>
</html>

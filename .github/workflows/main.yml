# =============================================================
# FILE LOCATION:  .github/workflows/build.yml
# =============================================================
# This workflow builds the Spring Boot JAR whenever you push
# to main/master or open a pull request.
# The finished .jar is uploaded as a downloadable artifact
# under Actions → your workflow run → Artifacts.
# =============================================================

name: Build Spring Boot JAR

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:          # lets you trigger the build manually from the Actions tab

jobs:
  build:
    name: Build & Upload JAR
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java 17  (change java-version if your project uses 11 or 21)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'   # Eclipse Temurin — free, widely used

      # 3. Cache the local Maven repository so dependencies aren't
      #    re-downloaded on every run (speeds things up a lot)
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Make the Maven wrapper executable (required on Linux runners)
      - name: Make mvnw executable
        run: chmod +x mvnw

      # 5. Build the JAR — skipping tests so the build is fast.
      #    Remove -DskipTests if you want tests to run (recommended
      #    once you have a test suite).
      - name: Build JAR with Maven
        run: ./mvnw clean package -DskipTests --batch-mode

      # 6. Copy the JAR to a dedicated folder for the upload step
      - name: Stage JAR for upload
        run: |
          mkdir -p staging
          cp target/*.jar staging/

      # 7. Upload the JAR as a GitHub Actions artifact.
      #    After the workflow finishes you can download it from:
      #    GitHub → Actions → this run → Artifacts section at the bottom.
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gold-Frontend-JAR          # name shown in the Artifacts panel
          path: staging/                   # folder whose contents get zipped
          retention-days: 30              # artifact is kept for 30 days

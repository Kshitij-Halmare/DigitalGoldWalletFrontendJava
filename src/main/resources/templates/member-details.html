<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Insights | Digital Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37; --gold-dark: #8A6D3B; --bg-dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.03); --border: rgba(212, 175, 55, 0.2);
        }
        body {
            background: radial-gradient(circle at top, #1c1c1c 0%, #000000 100%);
            color: #e0e0e0; font-family: 'Inter', sans-serif; padding: 50px 10%;
        }
        h2 {
            font-family: 'Playfair Display', serif; color: var(--gold);
            text-align: center; font-size: 2.2rem; letter-spacing: 3px;
            text-transform: uppercase; margin-bottom: 40px;
        }
        #userDetails {
            width: 100%; max-width: 600px; margin: 0 auto 50px;
            border-collapse: separate; border-spacing: 0 8px;
        }
        #userDetails th {
            text-align: left; color: var(--gold); font-size: 0.8rem;
            text-transform: uppercase; padding: 15px;
            background: var(--glass); border-left: 2px solid var(--gold);
        }
        #userDetails td { background: rgba(255,255,255,0.05); padding: 15px; }

        .breadcrumb { width: 90%; margin: 0 auto 20px auto; color: #aaa; font-size: 0.85rem; }
        .breadcrumb span { cursor: pointer; }
        .breadcrumb .active { color: var(--gold); }

        button {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: #000; border: none; padding: 12px 30px; font-weight: 700;
            border-radius: 5px; cursor: pointer; display: block; margin: 40px auto;
        }
        #statsBox {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin: 40px 0;
        }
        .statCard {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }
        /* Table specific fixes */
        .table-container {
            overflow-x: auto;
            background: var(--glass);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid var(--border);
        }

        #physicalTransactions {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px; /* This creates the gap between rows */
        }

        #physicalTransactions th {
            color: var(--gold);
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--gold);
        }

        #physicalTransactions td {
            background: rgba(255, 255, 255, 0.02); /* Glass effect for rows */
            padding: 15px;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* Specific alignment for the contact info */
        .contact-info {
            line-height: 1.2;
        }
        .contact-info small {
            display: block;
            color: #888;
            margin-top: 2px;
        }
        .statLabel { color: var(--gold); display: block; margin-bottom: 10px; }
        .statValue { font-size: 1.8rem; font-weight: 600; color: #fff; }
    </style>
</head>
<body>
<div class="breadcrumb">
    <span onclick="window.location.href='/members'">Members</span>
    <span style="margin: 0 8px;">/</span>
    <span class="active">User Dashboard</span>
</div>

<h2>Account Profile</h2>

<table id="userDetails">
    <tr>
        <th>User ID</th>
        <td th:text="'#' + ${user.userId}">#0</td>
    </tr>
    <tr>
        <th>Name</th>
        <td th:text="${user.name}">Name</td>
    </tr>
    <tr>
        <th>Email</th>
        <td th:text="${user.email}">Email</td>
    </tr>
    <tr>
        <th>Wallet Balance</th>
        <td th:text="${'₹ ' + #numbers.formatDecimal(user.balance, 1, 2)}">₹ 0.00</td>
    </tr>
    <tr>
<!--        <th>Address</th>-->
<!--        <td th:if="${address != null}"-->
<!--            th:text="${address.street + ', ' + address.city + ', ' + address.state + ' ' + address.postalCode}">-->
<!--        </td>-->
<!--        <td th:unless="${address != null}" style="color: #888; font-style: italic;">-->
<!--            Not Available-->
<!--        </td>-->
    </tr>
    <tr>
        <th>Member Since</th>
        <td th:text="${user.createdAt != null ? #strings.substring(user.createdAt,0,10) : 'N/A'}">Date</td>
    </tr>
</table>

<div id="statsBox">
    <div class="statCard">
        <span class="statLabel">Vaulted Gold</span>
        <span class="statValue" th:text="${totalQty + 'g'}">0g</span>
    </div>
    <div class="statCard">
        <span class="statLabel">Asset Value</span>
        <span class="statValue" th:text="${'₹' + totalVal}">₹0</span>
    </div>
    <div class="statCard">
        <span class="statLabel">Total Orders</span>
        <span class="statValue" th:text="${totalOrders}">0</span>
    </div>
</div>

<h2>Physical Assets</h2>
<div class="table-container">
    <table id="physicalTransactions">
        <thead>
        <tr>
            <th>ID</th>
            <th>Qty (g)</th>
            <th>Amount</th>
            <th>Vendor</th>
<!--            <th>Contact</th>-->
            <th>Location</th>
            <th>Type</th>
<!--            <th>Status</th>-->
<!--            <th>Date</th>-->
        </tr>
        </thead>
        <tbody>
        <tr th:each="tx : ${assets}">
            <td th:text="${tx.transactionId}">#</td>
            <td style="color:var(--gold); font-weight: 600;" th:text="${tx.quantity + 'g'}">0g</td>
            <td th:text="'₹' + ${#numbers.formatDecimal(tx.amount, 1, 2)}">₹0</td>
            <td th:text="${tx.branch.vendors.vendorName}">Vendor</td>
<!--            <td class="contact-info">-->
<!--                <span th:text="${tx.branch.vendors.contactPersonName}">Name</span>-->
<!--                <small th:text="${tx.branch.vendors.contactEmail}"></small>-->
<!--            </td>-->
            <td>
                <span th:text="${tx.branch.address.street}">City</span>,
                <small th:text="${tx.branch.address.city}" style="display:block; color:#888;"></small>
                <small th:text="${tx.branch.address.state}" style="display:block; color:#888;"></small>
                <small th:text="${tx.branch.address.postalCode}" style="display:block; color:#888;"></small>
            </td>
            <td th:text="${tx.transactionType}">Type</td>
<!--            <td>-->
<!--                <span th:text="${tx.transactionStatus}"-->
<!--                      th:style="${tx.transactionStatus == 'SUCCESS' ? 'color: #4CAF50' : 'color: var(&#45;&#45;gold)'}">-->
<!--                </span>-->
<!--            </td>-->
<!--            <td th:text="${tx.createdAt != null ? #strings.substring(tx.createdAt, 0, 10) : '-'}">Date</td>-->
        </tr>
        <tr th:if="${#lists.isEmpty(assets)}">
            <td colspan="9" style="text-align:center; padding:60px; color:#888; font-style:italic;">
                No physical gold records found for this vault.
            </td>
        </tr>
        </tbody>
    </table>
</div>

<button onclick="window.location.href='/members'">Return to Ledger</button>

</body>
</html>

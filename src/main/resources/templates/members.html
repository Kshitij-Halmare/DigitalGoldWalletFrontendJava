<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Member Directory | Digital Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg-dark: #0a0a0a; --glass: rgba(255,255,255,0.03); --modal-bg: #151515; }
        body { background: radial-gradient(circle at center,#1a1a1a 0%,#000 100%); color:#e0e0e0; font-family:'Inter',sans-serif; margin:0; padding:50px; }
        h2 { font-family:'Playfair Display',serif; color:var(--gold); text-align:center; font-size:2.5rem; letter-spacing:4px; margin-bottom:10px; }
        .subtitle { text-align:center; color:#888; margin-bottom:40px; text-transform:uppercase; font-size:0.8rem; letter-spacing:2px; }
        .top-bar { text-align:right; margin-bottom:20px; width:90%; margin-left:auto; margin-right:auto; }
        table { width:95%; margin:0 auto; border-collapse:separate; border-spacing:0 12px; }
        th { color:var(--gold); font-size:0.75rem; text-transform:uppercase; padding:20px; background:rgba(212,175,55,0.05); border-bottom:1px solid var(--gold); }
        td { background:var(--glass); padding:20px; text-align:center; border-top:1px solid rgba(255,255,255,0.05); border-bottom:1px solid rgba(255,255,255,0.05); }
        tr:hover td { background:rgba(212,175,55,0.08); cursor:pointer; }
        .search-container { display:flex; flex-direction:column; gap:5px; margin-top:10px; }
        input { background:#111; border:1px solid #333; color:#fff; padding:8px; border-radius:4px; font-size:0.8rem; }
        input:focus { border-color: var(--gold); outline: none; }
        button { background:var(--gold); color:#000; border:none; padding:8px 15px; font-weight:600; border-radius:3px; cursor:pointer; font-size:0.7rem; text-transform:uppercase; transition:0.3s; }
        button:hover { opacity:0.8; box-shadow:0 0 10px var(--gold); }
        .btn-outline { background:transparent; border:1px solid var(--gold); color:var(--gold); margin-left:5px; }
        .pagination { text-align:center; margin-top:30px; min-height:40px; }
        .page-btn { background:transparent; border:1px solid #444; color:#fff; width:35px; height:35px; margin:0 5px; border-radius:50%; cursor:pointer; }
        .page-btn.active { border-color:var(--gold); color:var(--gold); }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; z-index:1000; backdrop-filter:blur(5px); }
        .modal-overlay.open { display:flex; }
        .modal-card { background:var(--modal-bg); border:1px solid var(--gold); padding:30px; width:460px; border-radius:12px; box-shadow:0 10px 50px rgba(0,0,0,0.5); animation:fadeIn 0.3s ease; max-height:90vh; overflow-y:auto; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)} }
        .modal-card h3 { font-family:'Playfair Display',serif; color:var(--gold); margin-top:0; text-transform:uppercase; letter-spacing:2px; border-bottom:1px solid rgba(212,175,55,0.2); padding-bottom:15px; margin-bottom:20px; }
        .form-group { margin-bottom:14px; }
        .form-group label { font-size:0.75rem; color:#888; text-transform:uppercase; display:block; margin-bottom:4px; }
        .form-group input { width:100%; box-sizing:border-box; }
        .error-text { color:red; font-size:11px; margin-top:3px; min-height:14px; }
        .section-title { color:var(--gold); font-size:0.7rem; text-transform:uppercase; letter-spacing:2px; margin:18px 0 10px; border-bottom:1px solid rgba(212,175,55,0.15); padding-bottom:6px; }
        .modal-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }
        .row-2 { display:flex; gap:12px; }
        .row-2 .form-group { flex:1; }
        .breadcrumb { width:90%; margin:0 auto 20px auto; color:#aaa; font-size:0.85rem; }
        .breadcrumb span { cursor:pointer; }
        .breadcrumb .separator { margin:0 8px; color:#555; }
        .breadcrumb .active { color:var(--gold); cursor:default; }
        .breadcrumb span:hover:not(.active) { color:var(--gold); }
        .flash-success { background:rgba(212,175,55,0.1); border:1px solid var(--gold); color:var(--gold); padding:12px 20px; border-radius:6px; width:90%; margin:0 auto 20px auto; text-align:center; font-size:0.85rem; }
    </style>
</head>
<body>

<div class="breadcrumb">
    <span onclick="window.location.href='/'">Home</span>
    <span class="separator">/</span>
    <span class="active">Members</span>
</div>

<h2>Vault Members</h2>
<div class="subtitle">Digital Finance • Gold Backed</div>

<div class="flash-success" th:if="${success}" th:text="${success}"></div>

<div class="top-bar">
    <button onclick="document.getElementById('addModal').classList.add('open')">+ Create New Account</button>
</div>

<table>
    <thead>
    <tr>
        <th>Sr.</th>
        <th>UID</th>
        <th>
            Name
            <div class="search-container">
                <input id="nameSearch" placeholder="Filter name...">
                <div style="display:flex;gap:5px;margin-top:4px;">
                    <button onclick="searchUsers()">Find</button>
                    <button class="btn-outline" onclick="clearSearch()">Clear</button>
                </div>
            </div>
        </th>
        <th>
            Email
            <div class="search-container">
                <input id="emailSearch" placeholder="Filter email...">
                <div style="display:flex;gap:5px;margin-top:4px;">
                    <button onclick="searchUsers()">Find</button>
                    <button class="btn-outline" onclick="clearSearch()">Clear</button>
                </div>
            </div>
        </th>
        <th>Balance</th>
        <th>Joined</th>
        <th>Management</th>
    </tr>
    </thead>
    <tbody id="usersTable">
    <th:block th:if="${users != null and !#lists.isEmpty(users)}">
        <tr th:each="user, stat : ${users}"
            th:attr="data-uid=${user.getUserId()}, data-prefix=${detailUrlPrefix}"
            onclick="window.location.href = this.dataset.prefix + this.dataset.uid"
            style="cursor:pointer">
            <td th:text="${stat.index + 1 + currentPage * 20}">1</td>
            <td style="color:var(--gold)" th:text="'#' + ${user.getUserId()}">#1</td>
            <td th:text="${user.name}">Name</td>
            <td th:text="${user.email}">Email</td>
            <td th:text="'₹' + ${user.balance}">₹0</td>
            <td th:text="${user.createdAt != null ? #strings.substring(user.createdAt,0,10) : '-'}">Date</td>
            <td onclick="event.stopPropagation()">
                <button type="button"
                        th:attr="data-uid=${user.getUserId()}"
                        onclick="showDepositModal(this.dataset.uid)">Deposit</button>

                <button type="button" class="btn-outline"
                        th:attr="data-uid=${user.getUserId()}, data-name=${user.name}, data-email=${user.email}"
                        onclick="openEditModal(this)">Edit</button>
            </td>
        </tr>
    </th:block>
    <th:block th:if="${users == null or #lists.isEmpty(users)}">
        <tr>
            <td colspan="7" style="text-align:center;padding:80px;color:#888;font-style:italic;">
                <div style="font-size:1.2rem;color:var(--gold);margin-bottom:10px;">No members found</div>
                Add your first member using the button above.
            </td>
        </tr>
    </th:block>
    </tbody>
</table>

<div id="pagination" class="pagination">
    <th:block th:if="${totalPages > 1}">
        <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <button type="button" class="page-btn"
                    th:classappend="${i == currentPage} ? ' active'"
                    th:attr="data-page=${i}"
                    onclick="loadPage(this.dataset.page)"
                    th:text="${i + 1}">1</button>
        </th:block>
    </th:block>
</div>


<div id="addModal" class="modal-overlay" th:classappend="${modal == 'add'} ? ' open'">
    <div class="modal-card">
        <h3>Create New Vault</h3>
        <form th:action="@{/members/new}" method="post">

            <div class="section-title">Account Info</div>

            <div class="form-group">
                <label>Account Holder Name</label>
                <input type="text" name="name" th:value="${addForm != null ? addForm.get('name') : ''}" placeholder="Full name">
                <div class="error-text" th:text="${addErrors != null ? addErrors.get('name') : ''}"></div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" th:value="${addForm != null ? addForm.get('email') : ''}" placeholder="email@example.com">
                <div class="error-text" th:text="${addErrors != null ? addErrors.get('email') : ''}"></div>
            </div>

            <div class="section-title">Address</div>

            <div class="form-group">
                <label>Street</label>
                <input type="text" name="street" th:value="${addForm != null ? addForm.get('street') : ''}" placeholder="123 Main St">
                <div class="error-text" th:text="${addErrors != null ? addErrors.get('street') : ''}"></div>
            </div>
            <div class="row-2">
                <div class="form-group">
                    <label>City</label>
                    <input type="text" name="city" th:value="${addForm != null ? addForm.get('city') : ''}" placeholder="Mumbai">
                    <div class="error-text" th:text="${addErrors != null ? addErrors.get('city') : ''}"></div>
                </div>
                <div class="form-group">
                    <label>State</label>
                    <input type="text" name="state" th:value="${addForm != null ? addForm.get('state') : ''}" placeholder="Maharashtra">
                    <div class="error-text" th:text="${addErrors != null ? addErrors.get('state') : ''}"></div>
                </div>
            </div>
            <div class="row-2">
                <div class="form-group">
                    <label>Postal Code</label>
                    <input type="text" name="postalCode" th:value="${addForm != null ? addForm.get('postalCode') : ''}" placeholder="400001">
                    <div class="error-text" th:text="${addErrors != null ? addErrors.get('postalCode') : ''}"></div>
                </div>
                <div class="form-group">
                    <label>Country</label>
                    <input type="text" name="country" th:value="${addForm != null ? addForm.get('country') : ''}" placeholder="India">
                    <div class="error-text" th:text="${addErrors != null ? addErrors.get('country') : ''}"></div>
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn-outline"
                        onclick="document.getElementById('addModal').classList.remove('open')">Cancel</button>
                <button type="submit">Create Account</button>
            </div>
        </form>
    </div>
</div>


<div id="editModal" class="modal-overlay" th:classappend="${modal == 'edit'} ? ' open'">
    <div class="modal-card">
        <h3>Edit Member</h3>
        <form id="editForm" th:action="@{/members/__${editForm != null && editForm.get('id') != null ? editForm.get('id') : 0}__/edit}" method="post">

            <input type="hidden" name="originalEmail" id="editOriginalEmail" th:value="${editForm != null ? editForm.get('originalEmail') : ''}">

            <div class="form-group">
                <label>Account Holder Name</label>
                <input type="text" name="name" id="editName"
                       th:value="${editForm != null ? editForm.get('name') : ''}" placeholder="Full name">
                <div class="error-text" th:text="${editErrors != null ? editErrors.get('name') : ''}"></div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" id="editEmail"
                       th:value="${editForm != null ? editForm.get('email') : ''}" placeholder="email@example.com">
                <div class="error-text" th:text="${editErrors != null ? editErrors.get('email') : ''}"></div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn-outline"
                        onclick="document.getElementById('editModal').classList.remove('open')">Cancel</button>
                <button type="submit">Save Changes</button>
            </div>
        </form>
    </div>
</div>


<div id="depositModal" class="modal-overlay">
    <div class="modal-card">
        <h3>Gold Deposit</h3>
        <form id="depositForm" method="post">
            <div class="form-group">
                <label>Deposit Amount (₹)</label>
                <input type="number" id="depositAmount" name="amount" min="1" step="0.01" placeholder="Enter amount">
                <div class="error-text" id="depositError"></div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-outline"
                        onclick="document.getElementById('depositModal').classList.remove('open')">Cancel</button>
                <button type="button" onclick="submitDeposit()">Confirm</button>
            </div>
        </form>
    </div>
</div>


<script th:inline="javascript">
    const BACKEND_URL = /*[[${@environment.getProperty('backend.base-url')}]]*/ "http://localhost:8080";
    const BASE_URL    = BACKEND_URL + "/users";
    let currentPage   = /*[[${currentPage}]]*/ 0;
    let currentURL    = BASE_URL;

    const detailPrefix = /*[[${detailUrlPrefix}]]*/ "/members/";

    function openEditModal(btn) {
        const id    = btn.dataset.uid;
        const name  = btn.dataset.name;
        const email = btn.dataset.email;

        document.getElementById('editName').value          = name;
        document.getElementById('editEmail').value         = email;
        document.getElementById('editOriginalEmail').value = email;
        document.getElementById('editForm').action         = '/members/' + id + '/edit';

        document.getElementById('editModal').classList.add('open');
    }

    let depositUserId = null;

    function showDepositModal(userId) {
        depositUserId = userId;
        document.getElementById('depositAmount').value = '';
        document.getElementById('depositError').innerText = '';
        document.getElementById('depositModal').classList.add('open');
    }

    function submitDeposit() {
        const amount   = Number(document.getElementById('depositAmount').value);
        const errorBox = document.getElementById('depositError');
        errorBox.innerText = '';
        if (!amount || amount < 1 || amount > 500000) {
            errorBox.innerText = 'Enter a valid amount between ₹1 and ₹5,00,000';
            return;
        }
        fetch(`/api/deposit/${depositUserId}?amount=${amount}`, { method: 'PUT' })
            .then(res => {
                if (!res.ok) throw new Error();
                document.getElementById('depositModal').classList.remove('open');
                window.location.reload(); // Instantly update balance display
            })
            .catch(() => { errorBox.innerText = 'Deposit failed. Is the backend running?'; });
    }

    function searchUsers() {
        const name  = document.getElementById('nameSearch').value.trim();
        const email = document.getElementById('emailSearch').value.trim();
        if (name)       currentURL = `${BASE_URL}/search/findByNameContainingIgnoreCase?name=${encodeURIComponent(name)}`;
        else if (email) currentURL = `${BASE_URL}/search/findByEmailContainingIgnoreCase?email=${encodeURIComponent(email)}`;
        else            currentURL = BASE_URL;
        loadPage(0);
    }

    function clearSearch() {
        document.getElementById('nameSearch').value  = '';
        document.getElementById('emailSearch').value = '';
        currentURL = BASE_URL;
        loadPage(0);
    }

    function loadPage(page) {
        currentPage = page;
        const sep = currentURL.includes('?') ? '&' : '?';
        fetch(`${currentURL}${sep}page=${page}&size=20`)
            .then(r => r.json())
            .then(data => {
                const tbody = document.getElementById('usersTable');
                tbody.innerHTML = '';
                const users = data._embedded?.userses;
                if (users && users.length > 0) {
                    users.forEach((user, i) => {
                        const href = user._links.self.href;
                        const uid = href.substring(href.lastIndexOf('/') + 1);
                        const name  = (user.name  || '').replace(/'/g, "\\'");
                        const email = (user.email || '').replace(/'/g, "\\'");

                        tbody.innerHTML += `
                            <tr onclick="window.location.href='${detailPrefix}${uid}'" style="cursor:pointer">
                                <td>${i + 1 + page * 20}</td>
                                <td style="color:var(--gold)">#${uid}</td>
                                <td>${user.name}</td>
                                <td>${user.email}</td>
                                <td>₹${user.balance}</td>
                                <td>${formatDate(user.createdAt)}</td>
                                <td onclick="event.stopPropagation()">
                                    <button type="button" onclick="showDepositModal(${uid})">Deposit</button>
                                    <button type="button" class="btn-outline"
                                            data-uid="${uid}" data-name="${name}" data-email="${email}"
                                            onclick="openEditModal(this)">Edit</button>
                                </td>
                            </tr>`;
                    });
                    buildPagination(data.page?.totalPages || 0);
                } else {
                    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:60px;color:#888;">No results found.</td></tr>`;
                    buildPagination(0);
                }
            });
    }

    function buildPagination(total) {
        const el = document.getElementById('pagination');
        el.innerHTML = '';
        if (total <= 1) return;
        for (let i = 0; i < total; i++) {
            el.innerHTML += `<button type="button" class="page-btn${i === currentPage ? ' active' : ''}"
                onclick="loadPage(${i})">${i + 1}</button>`;
        }
    }

    function formatDate(d) {
        if (!d) return '-';
        const dt = new Date(d);
        return `${String(dt.getDate()).padStart(2,'0')} ${dt.toLocaleString('default',{month:'long'})} ${dt.getFullYear()}`;
    }
</script>
</body>
</html>

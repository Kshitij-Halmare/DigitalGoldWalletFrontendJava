<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Member Directory | Digital Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --bg-dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.03);
            --modal-bg: #151515;
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 50px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            text-align: center;
            font-size: 2.5rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 40px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        table {
            width: 95%;
            margin: 0 auto;
            border-collapse: separate;
            border-spacing: 0 12px;
        }

        th {
            color: var(--gold);
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 20px;
            background: rgba(212, 175, 55, 0.05);
            border-bottom: 1px solid var(--gold);
        }

        td {
            background: var(--glass);
            padding: 20px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        tr:hover td { background: rgba(212, 175, 55, 0.08); cursor: pointer; }

        .pagination { text-align: center; margin-top: 30px; min-height: 40px; }

        .page-link {
            text-decoration: none;
            display: inline-block;
        }

        .page-btn {
            background: transparent;
            border: 1px solid #444;
            color: #fff;
            width: 35px;
            height: 35px;
            margin: 0 5px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
        }

        .page-btn.active { border-color: var(--gold); color: var(--gold); }
        .page-btn:hover:not(.active) { border-color: #888; }

        button {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 8px 15px;
            font-weight: 600;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            margin-left: 5px;
        }

        /* Add this inside your <style> tag */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none; /* Controlled by JS */
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-card {
            background: var(--modal-bg);
            border: 1px solid var(--gold);
            padding: 30px;
            width: 400px;
            border-radius: 12px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-card h3 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .modal-form { display: flex; flex-direction: column; gap: 15px; }
        .modal-form label { font-size: 0.75rem; color: #888; text-transform: uppercase; }

        /* Styling for the numeric input inside modal */
        .modal-form input {
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 10px;
            border-radius: 4px;
        }

        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<h2>Vault Members</h2>
<div class="subtitle">Digital Finance • Gold Backed</div>

<table>
    <thead>
    <tr>
        <th>Sr.</th>
        <th>UID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Balance</th>
        <th>Joined</th>
        <th>Management</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user, iter : ${users}"
        th:onclick="|window.location.href='/members/' + ${user.userId}|">

        <td th:text="${iter.index + 1 + (currentPage * 20)}">1</td>
        <td style="color:var(--gold)" th:text="'#' + ${user.userId}">#29</td>
        <td th:text="${user.name}">Name</td>
        <td th:text="${user.email}">Email</td>
        <td th:text="'₹' + ${user.balance}">₹0.00</td>
        <td th:text="${user.createdAt != null ? #strings.substring(user.createdAt,0,10) : 'N/A'}">Date</td>

        <td onclick="event.stopPropagation()">
            <button th:onclick="'showDepositModal(' + ${user.userId} + ')'">Deposit</button>
            <button class="btn-outline">Edit</button>
        </td>
    </tr>
    </tbody>
</table>

<div class="pagination" th:if="${totalPages > 1}">
    <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
       th:href="@{/members(page=${i})}"
       class="page-link">
        <button th:text="${i + 1}"
                th:class="${i == currentPage} ? 'page-btn active' : 'page-btn'">
        </button>
    </a>
</div>

<div id="uiModal" class="modal-overlay">
    <div class="modal-card">
        <h3>Gold Deposit</h3>
        <div class="modal-form">
            <label>Deposit Amount (₹)</label>
            <input type="number" id="inputAmount" min="1" step="0.01" style="width: 100%;">
            <div id="depositError" style="color:red; font-size:12px;"></div>
        </div>
        <div class="modal-actions">
            <button class="btn-outline" onclick="closeModal()">Cancel</button>
            <button id="modalSubmitBtn">Confirm</button>
        </div>
    </div>
</div>

    <script>
        let currentDepositId = null;

function showDepositModal(id) {
    currentDepositId = id;
    document.getElementById('uiModal').style.display = 'flex';
    document.getElementById('modalSubmitBtn').onclick = () => executeDeposit();
}

function closeModal() {
    document.getElementById('uiModal').style.display = 'none';
}

async function executeDeposit() {
    const amount = document.getElementById('inputAmount').value;

    if(!amount || amount <= 0) {
        document.getElementById('depositError').innerText = "Please enter a valid amount.";
        return;
    }

    // Call your Project B API
    const response = await fetch(`/api/deposit/${currentDepositId}?amount=${amount}`, {
        method: 'PUT'
    });

    if (response.ok) {
        closeModal();
        window.location.reload(); // Refresh the page to see the updated balance
    } else {
        alert("Deposit failed. Check backend logs.");
    }
}
    </script>
</body>
</html>
